apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: task-api
  template:
    metadata:
      labels:
        app: task-api
    spec:
      containers:
      - name: api
        image: ghcr.io/notamalvair/simple-task-api:latest
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"